# ============================================================
#  Mosquitto MQTT Broker Configuration
#  SmartBin Demo — ISBAT University IoT Project
#
#  INSTALLATION:
#    Ubuntu/Debian:  sudo apt install mosquitto mosquitto-clients
#    Windows:        https://mosquitto.org/download/
#    macOS:          brew install mosquitto
#
#  USAGE:
#    Place this file at:
#      Linux:   /etc/mosquitto/conf.d/smartbin.conf
#      Windows: C:\Program Files\mosquitto\mosquitto.conf (replace)
#      macOS:   /opt/homebrew/etc/mosquitto/mosquitto.conf (replace)
#
#    Then restart: sudo systemctl restart mosquitto
#    Or run directly: mosquitto -c smartbin.conf -v
#
#  WHY THIS CONFIG IS NEEDED:
#    Default Mosquitto only accepts connections from localhost.
#    The ESP32 is a different device on the network, so we must
#    allow connections from any LAN address. This config does
#    that safely for a local demo environment.
# ============================================================

# ── Listener ────────────────────────────────────────────────
# Accept connections on port 1883 from any network interface.
# This allows the ESP32 (on the same Wi-Fi) to connect.
listener 1883 0.0.0.0

# ── Authentication ───────────────────────────────────────────
# For the exhibition demo, anonymous access is fine.
# In production, replace with password_file authentication.
allow_anonymous true

# To add a password (recommended for any non-demo deployment):
#   1. Run: mosquitto_passwd -c /etc/mosquitto/passwd smartbin
#   2. Uncomment below and comment out allow_anonymous:
# password_file /etc/mosquitto/passwd
# allow_anonymous false

# ── Logging ──────────────────────────────────────────────────
# Log to stdout so you can see connections and messages in terminal.
# Change to a file path to persist logs.
log_dest stdout
log_type all

# Optional: log to file as well
# log_dest file /var/log/mosquitto/smartbin.log

# ── Persistence ──────────────────────────────────────────────
# Keep retained messages (fill levels) across broker restarts.
persistence true
persistence_location /tmp/mosquitto/

# ── Connection limits ────────────────────────────────────────
max_connections 20
max_keepalive 120

# ── Message size ─────────────────────────────────────────────
# Our JSON payloads are tiny — 256 bytes is generous.
message_size_limit 256
